<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <header class="popup-header">
            <img src="icons/icon-48.png" alt="" class="popup-icon">
            <h1 id="popup-title"></h1>
        </header>
        <div class="popup-actions">
            <button id="check-btn" class="btn btn-primary" disabled></button>
            <button id="clear-btn" class="btn btn-ghost"></button>
        </div>
        <div id="popup-summary" class="popup-summary"></div>
        <div id="popup-log" class="popup-log">
            <p id="popup-empty" class="popup-empty"></p>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
